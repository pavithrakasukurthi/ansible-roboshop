- name: configuring cart service
  hosts: cart
  become: yes

  tasks: 
  - name: disabling default nodejs
    ansible.builtin.command:
     dnf module disable nodejs -y 
  
  - name: enabling nodejs 20
    ansible.builtin.command:
     dnf module enable nodejs:20 -y 

  - name: installing nodejs
    ansible.builtin.command:
     dnf install nodejs -y 

  - name: creating system user
    ansible.builtin.user:
     name: roboshop
     comment: roboshop system user
     system: true
     shell: /sbin/nologin
     home: /app

  - name: removing app directory
    ansible.builtin.file:
     path: /app
     state: absent
  
  - name: creating app directory
    ansible.builtin.file:
     path: /app
     state: present
  
  - name: removing cart zip file
    ansible.builtin.file:
    path: /tmp/cart.zip
    state: absent

  - name: downloading cart app zip file
    ansible.builtin.get_url:
     url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip
     dest: /tmp/cart.zip

  - name: extracting cart zip file
    ansible.builtin.unarchive:
     src: /tmp/cart.zip
     dest: /app
     remote_src: yes

  - name: installing dependencies
    community.general.npm:
     path: /app

  - name: copying cart service file
    ansible.builtin.copy:
     src: cart.service
     dest: /etc/systemd/system/cart.service

  - name: daemon reloading
    ansible.builtin.systemd_service:
     name: cart
     enabled: yes
     state: started
     daemon_reload: yes