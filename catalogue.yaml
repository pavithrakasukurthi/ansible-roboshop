- name: configuring catalogue
  hosts: catalogue
  become: yes

  tasks:
    - name: disable default nodejs
      ansible.builtin.command: dnf module disable nodejs -y

    - name: enabling nodejs 20
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: installing nodejs
      ansible.builtin.package:
        name: nodejs
        state: present

    - name: creating roboshop user
      ansible.builtin.user:
        name: roboshop
        system: yes
        shell: /sbin/nologin
        home: /app

    - name: removing app directory
      ansible.builtin.file:
        path: /app
        state: absent

    - name: creating app directory
      ansible.builtin.file:
        path: /app
        state: directory

    - name: downloading catalogue app zip file
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip

    - name: extracting catalogue zip file
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes

    - name: installing dependencies
      community.general.npm:
        path: /app

    - name: copying catalogue service
      ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service

    - name: copy mongo repo
      ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo

    - name: installing mongodb client
      ansible.builtin.package:
        name: mongodb-mongosh
        state: present

    - name: connecting to mongodb catalogue
      ansible.builtin.command: mongosh mongodb.pavithra.sbs --quiet --eval "db.getMongo().getDBNames().indexOf('catalogue')"
      register: catalogue_output

    - name: loading products into db
      ansible.builtin.shell: mongosh --host mongodb.pavithra.sbs </app/db/master-data.js
      when: catalogue_output.stdout | int < 0

    - name: daemon reloading
      ansible.builtin.systemd_service:
        name: catalogue
        enabled: yes
        state: started
        daemon_reload: yes
