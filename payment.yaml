- name: configuring payment service
  hosts: payment
  become: yes

  tasks:
  - name: installing python tools
    ansible.builtin.dnf:
     name: "{{ item }}"
     state: present
    loop:
    - python3
    - gcc
    - python3-devel

  - name: creating system user
    ansible.builtin.user:
     name: roboshop
     comment: roboshop system user
     system: yes
     home: /app
     shell: /sbin/nologin

  - name: removing app directory
    ansible.builtin.file:
     path: /app
     state: absent

  - name: creating app directory
    ansible.builtin.file:
     path: /app
     state: directory

  - name: removing zip file
    ansible.builtin.file:
     path: /tmp/payment.zip
     state: absent

  - name: downloading app code
    ansible.builtin.get_url:
     url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
     dest: /tmp/payment.zip

  - name: unzipping the file
    ansible.builtin.unarchive:
     src: /tmp/payment.zip
     dest: /app
     remote_src: yes

  - name: installing dependencies
    ansible.builtin.pip:
     requirements: requirements.txt
     executable: pip3.9
    args:
     chdir: /app

  - name: copying service file
    ansible.builtin.copy:
     src: payment.service
     dest: /etc/systemd/system/payment.service

  - name: daemon reloading and enabling service
    ansible.builtin.systemd_service:
     name: payment
     state: started
     enabled: yes
     daemon_reload: yes
