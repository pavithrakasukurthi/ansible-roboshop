- name: configuring shipping service
  hosts: shipping
  become: yes

  tasks: 
  - name: install packages
    ansible.builtin.dnf:
     name: "{{ item }}"
     state: present
    loop:
    - maven
    - mysql

  - name: installing mysql python libraries
    ansible.builtin.pip:
     executable: pip3.9
     name: "{{ item }}"
    loop:
    - cryptography
    - MyPySQL

  - name: creating roboshop system user
    ansible.builtin.user:
     name: roboshop
     system: yes
     shell: /sbin/nologin
     home: /app

  - name: removing app directory
    ansible.builtin.file:
     path: /app
     state: absent

  - name: creating app directory
    ansible.builtin.file:
     path: /app
     state: directory

  - name: deleting shipping zip file
    ansible.builtin.file:
     path: /tmp/shipping.zip
     state: absent

  - name: download shipping app code
    ansible.builtin.get_url:
     url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
     dest: /tmp/shipping.zip

  - name: extracting app code
    ansible.builtin.unarchive:
     src: /tmp/shipping.zip
     dest: /app
     remote_src: yes

  - name: installing dependencies
    ansible.builtin.command:
     mvn clean package
    args:
     chdir: /app

  - name: renaming jar file
    ansible.builtin.command:
     mv target/shipping-1.0.jar shipping.jar
    args:
     chdir: /app

  - name: copying shipping service file
    ansible.builtin.copy:
     src: shipping.service
     dest: /etc/systemd/system/shipping.service

  - name: import shipping data into mysql
    community.mysql.mysql_db:
     state: import
     name: all 
     login_host: mysql.pavithra.sbs
     login_user: root
     login_password: RoboShop@1
     target: "{{ item }}"
    loop:
    - /app/db/schema.sql
    - /app/db/app-user.sql 
    - /app/db/master-data.sql

  - name: daemon reload and enabling shipping
    ansible.builtin.systemd_service:
     name: shipping
     state: started
     enabled: yes
     daemon_reload: yes
     